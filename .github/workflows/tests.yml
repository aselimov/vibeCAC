name: Fortran Tests

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_optional_long_tests:
        description: "Run optional long-running integration tests"
        required: true
        default: false
        type: boolean

jobs:
  unit-tests:
    name: Unit tests (fast)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libopenmpi-dev openmpi-bin gcovr

      - name: Enforce assertion-bearing unit tests
        run: .github/scripts/enforce_unit_assertions.sh

      - name: Run unit tests
        working-directory: src
        run: |
          make unit-test UNIT_TEST=math
          make unit-test UNIT_TEST=str

      - name: Run coverage gate
        working-directory: src
        run: make unit-test-coverage UNIT_TEST=math

      - name: Coverage delta for touched modules (PR)
        if: github.event_name == 'pull_request'
        run: .github/scripts/coverage_delta.sh

      - name: Collect coverage artifacts
        if: always()
        working-directory: src
        run: |
          gcov math.f90 -o obj || true
          mkdir -p artifacts
          find . -maxdepth 2 \( -name '*.gcov' -o -name '*.gcda' -o -name '*.gcno' \) -print0 | xargs -0 -r cp --parents -t artifacts

      - name: Upload unit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: src/artifacts

  optional-long-integration-tests:
    name: Optional long-running integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-tests
    if: github.event_name == 'workflow_dispatch' && inputs.run_optional_long_tests
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran libopenmpi-dev openmpi-bin

      - name: Run long integration tests
        working-directory: src
        run: |
          make test_pair_force
          make test_cg_calc

      - name: Collect integration logs
        if: always()
        working-directory: src
        run: |
          mkdir -p artifacts
          find tests -maxdepth 2 -type f \( -name '*.out' -o -name '*_test' \) -print0 | xargs -0 -r cp --parents -t artifacts

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: optional-long-integration-test-artifacts
          path: src/artifacts
